stages:
  - name: load
    stage: loader
    config: { type: zoo_op, op_name: topk, dummy_shape: [1, 32000] }
  - name: export
    stage: exporter
    config: { type: iree_turbine, out_path: artifacts/zoo-iree/topk.mlir }
  - name: analyze
    stage: analyzer
    config: { type: ir_summary, out_path: artifacts/zoo-iree/topk.summary.json }
