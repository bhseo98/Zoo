stages:
  - name: load
    stage: loader
    config: { type: zoo_op, op_name: mlp, dummy_shape: [1, 32, 512] }
  - name: export
    stage: exporter
    config: { type: iree_turbine, out_path: artifacts/zoo-iree/mlp.mlir }
  - name: analyze
    stage: analyzer
    config: { type: ir_summary, out_path: artifacts/zoo-iree/mlp.summary.json }
