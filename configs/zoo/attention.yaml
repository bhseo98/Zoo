stages:
  - name: load
    stage: loader
    config: { type: zoo_op, op_name: attention, dummy_shape: [1, 32, 512] }
  - name: export
    stage: exporter
    config: { type: torch_mlir_dialect, out_path: artifacts/zoo/attention.mlir }
  - name: analyze
    stage: analyzer
    config: { type: ir_summary, out_path: artifacts/zoo/attention.summary.json }
